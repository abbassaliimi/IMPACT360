<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Awfa Tasnim</title>
    <style>
        /* --- Mobile-First CSS Setup --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffdeeb; /* Base Bubblegum Pink */
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: linear-gradient(180deg, #ffb3d1 0%, #ff66a3 100%);
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
        }

        /* --- UI Overlay Layer --- */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let clicks pass through to canvas when needed */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
        }

        .interactive {
            pointer-events: auto;
        }

        /* HUD Styles */
        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #hud.visible {
            opacity: 1;
        }

        #score-display {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 3px 0 #d60062, 0 0 10px rgba(255,255,255,0.5);
            background: rgba(255, 255, 255, 0.25);
            padding: 6px 16px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        #lives-display {
            font-size: 24px;
            letter-spacing: 2px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
        }

        #mute-btn {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid #fff;
            font-size: 22px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        #mute-btn:active {
            transform: scale(0.9);
        }

        /* Screen Overlays (Menu & Game Over) */
        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 102, 163, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
            box-sizing: border-box;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 42px;
            color: #fff;
            margin: 0 0 10px 0;
            text-shadow: 0 4px 0 #cc0052, 0 0 20px rgba(255,255,255,0.6);
            letter-spacing: 1px;
            animation: bounce 2s infinite alternate;
        }

        .instruction {
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            margin-bottom: 30px;
            background: #00e5ff;
            padding: 8px 16px;
            border-radius: 30px;
            box-shadow: 0 4px 0 #00b3cc;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .highscore-txt {
            font-size: 18px;
            color: #ffe600;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }

        .cta-txt {
            font-size: 20px;
            color: #fff;
            font-weight: bold;
            animation: pulse 1.2s infinite;
            margin-top: 20px;
        }

        /* Game Over Specifics */
        .final-score {
            font-size: 48px;
            color: #ffe600;
            font-weight: 900;
            margin: 15px 0;
            text-shadow: 0 4px 0 #b3a200, 0 0 15px rgba(255,230,0,0.4);
        }

        .new-high-banner {
            background: #ffe600;
            color: #d60062;
            font-weight: 900;
            padding: 6px 20px;
            border-radius: 10px;
            font-size: 18px;
            margin-bottom: 20px;
            transform: rotate(-3deg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .btn {
            background: #00e5ff;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 0 6px 0 #00b3cc, 0 4px 15px rgba(0,229,255,0.4);
            cursor: pointer;
            transition: transform 0.1s;
            margin-top: 15px;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #00b3cc;
        }

        /* Animations */
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="ui-layer">
            <div id="hud">
                <div id="score-display">0</div>
                <div id="lives-display">❤️❤️❤️</div>
                <button id="mute-btn" class="interactive">🔊</button>
            </div>

            <div id="main-menu" class="screen-overlay interactive">
                <h1>Awfa Tasnim</h1>
                <div class="instruction">Tap screen to JUMP and SWAP direction!</div>
                <div class="highscore-txt" id="menu-highscore">High Score: 0</div>
                <div class="cta-txt">✨ Tap Anywhere to Start ✨</div>
            </div>

            <div id="game-over" class="screen-overlay interactive hidden">
                <h1>Game Over</h1>
                <div id="new-high-banner" class="new-high-banner hidden">🎉 NEW HIGH SCORE! 🎉</div>
                <div class="highscore-txt">Your Score</div>
                <div class="final-score" id="final-score-txt">0</div>
                <div class="highscore-txt" id="gameover-highscore">Best: 0</div>
                <button id="restart-btn" class="btn">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        // --- Game Tweakable Configurations ---
        const CONFIG = {
            baseSpeed: 150,          // Starting fallback element speed (pixels per second)
            speedStep: 12,           // Speed increase per caught item
            maxSpeed: 600,           // Speed limit
            spawnInterval: 1200,     // Initial item spawn rate (ms)
            minSpawnInterval: 500,   // Minimum spawn rate cap
            playerSpeedX: 280,       // Horizontal speed of player princess
            playerJumpForce: -400,   // Vertical jump surge force
            gravity: 1100,           // Gravity acting on jumping player
            colors: {
                pink: '#ff66a3',
                cyan: '#00e5ff',
                yellow: '#ffe600',
                white: '#ffffff',
                shadow: '#rgba(0,0,0,0.1)'
            }
        };

        // --- Audio Controller (Web Audio API Synthesizer) ---
        class AudioController {
            constructor() {
                this.ctx = null;
                this.muted = false;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            }

            playTap() {
                if (this.muted || !this.ctx) return;
                this.init();
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.08);
            }

            playCollect(isRare) {
                if (this.muted || !this.ctx) return;
                this.init();
                const now = this.ctx.currentTime;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'sine';
                
                const baseFreq = isRare ? 523.25 * 1.5 : 523.25; // C5 or G5
                osc.frequency.setValueAtTime(baseFreq, now);
                osc.frequency.setValueAtTime(baseFreq * 1.25, now + 0.08); // Arpeggiate up
                
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(now + 0.25);
            }

            playExplode() {
                if (this.muted || !this.ctx) return;
                this.init();
                const now = this.ctx.currentTime;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.linearRampToValueAtTime(60, now + 0.4);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(now + 0.4);
            }
        }

        const audio = new AudioController();

        // --- Player / Princess Object ---
        class Player {
            constructor(gameWidth, gameHeight) {
                this.gameWidth = gameWidth;
                this.gameHeight = gameHeight;
                this.width = 54;
                this.height = 54;
                this.reset();
            }

            reset() {
                this.x = this.gameWidth / 2 - this.width / 2;
                this.y = this.gameHeight - 110;
                this.groundY = this.gameHeight - 110;
                this.vy = 0;
                this.dir = 1; // 1 = Right, -1 = Left
                this.trail = [];
                this.emoji = '👑';
            }

            jumpAndTurn() {
                this.dir *= -1;
                this.vy = CONFIG.playerJumpForce;
            }

            update(dt) {
                // Horizontal Move
                this.x += CONFIG.playerSpeedX * this.dir * dt;
                
                // Screen boundaries bounce check
                if (this.x < 0) {
                    this.x = 0;
                    this.dir = 1;
                } else if (this.x + this.width > this.gameWidth) {
                    this.x = this.gameWidth - this.width;
                    this.dir = -1;
                }

                // Gravity and Jumping Physics
                this.vy += CONFIG.gravity * dt;
                this.y += this.vy * dt;

                if (this.y >= this.groundY) {
                    this.y = this.groundY;
                    this.vy = 0;
                }

                // Process motion trail
                this.trail.push({ x: this.x, y: this.y, alpha: 0.5 });
                if (this.trail.length > 6) {
                    this.trail.shift();
                }
            }

            render(ctx) {
                // Render fading motion trail
                this.trail.forEach((t, index) => {
                    t.alpha -= 0.05;
                    if (t.alpha <= 0) return;
                    ctx.save();
                    ctx.globalAlpha = t.alpha;
                    ctx.font = `${this.width}px serif`;
                    ctx.fillText(this.emoji, t.x, t.y + this.height - 5);
                    ctx.restore();
                });

                // Render main player princess
                ctx.save();
                ctx.font = `${this.width}px serif`;
                // Slight tilting effect depending on jumping state/direction
                ctx.translate(this.x + this.width/2, this.y + this.height/2);
                ctx.rotate(this.dir * 0.05 * (this.vy !== 0 ? 1 : 0));
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }
        }

        // --- Falling Items (Good Star / Rare Star / Obstacle Sun) ---
        class Item {
            constructor(gameWidth, currentSpeed) {
                this.gameWidth = gameWidth;
                this.width = 42;
                this.height = 42;
                this.x = Math.random() * (gameWidth - this.width);
                this.y = -this.height;
                this.speed = currentSpeed * (0.9 + Math.random() * 0.3); // Slight speed variance
                
                // Determine item type
                const rand = Math.random();
                if (rand < 0.55) {
                    this.type = 'good'; // Regular Star
                    this.emoji = '⭐';
                } else if (rand < 0.70) {
                    this.type = 'rare'; // Glowing Rare Star
                    this.emoji = '🌟';
                } else {
                    this.type = 'bad';  // Hazardous Sun
                    this.emoji = '☀️';
                }
                this.rotation = 0;
                this.rotSpeed = (Math.random() - 0.5) * 4;
            }

            update(dt) {
                this.y += this.speed * dt;
                this.rotation += this.rotSpeed * dt;
            }

            render(ctx) {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.rotate(this.rotation);
                
                if (this.type === 'rare') {
                    // Draw outer glow loop for rare items
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = CONFIG.colors.yellow;
                }

                ctx.font = `${this.width}px serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }
        }

        // --- Juice: Particles System ---
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 4 + 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 150 + 50;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.life = Math.random() * 0.4 + 0.3;
            }

            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.alpha -= dt / this.life;
            }

            render(ctx) {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // --- Juice: Floating Scores ---
        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.vy = -60;
                this.alpha = 1;
            }
            update(dt) {
                this.y += this.vy * dt;
                this.alpha -= dt * 1.5;
            }
            render(ctx) {
                if (this.alpha <= 0) return;
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.font = 'bold 22px Arial';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 4;
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
        }

        // --- Core Engine Framework ---
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                // Fixed Logical Aspect Ratio Layout Setup
                this.baseWidth = 360;
                this.baseHeight = 640;

                this.state = 'MENU'; // MENU, PLAYING, GAMEOVER
                this.score = 0;
                this.lives = 3;
                this.highScore = parseInt(localStorage.getItem('at_high_score')) || 0;
                
                this.items = [];
                this.particles = [];
                this.floatingTexts = [];
                
                this.currentSpeed = CONFIG.baseSpeed;
                this.spawnTimer = 0;
                this.currentSpawnInterval = CONFIG.spawnInterval;
                
                this.shakeTime = 0;
                this.shakeIntensity = 0;
                this.lastTime = 0;

                this.player = new Player(this.baseWidth, this.baseHeight);
                
                this.initDOM();
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
                
                // Core Frame Interceptors
                window.requestAnimationFrame((t) => this.loop(t));
            }

            initDOM() {
                this.hud = document.getElementById('hud');
                this.scoreDisplay = document.getElementById('score-display');
                this.livesDisplay = document.getElementById('lives-display');
                this.mainMenu = document.getElementById('main-menu');
                this.gameOverScreen = document.getElementById('game-over');
                this.menuHighScore = document.getElementById('menu-highscore');
                this.gameoverHighScore = document.getElementById('gameover-highscore');
                this.finalScoreTxt = document.getElementById('final-score-txt');
                this.newHighBanner = document.getElementById('new-high-banner');
                this.muteBtn = document.getElementById('mute-btn');
                this.restartBtn = document.getElementById('restart-btn');

                this.menuHighScore.innerText = `High Score: ${this.highScore}`;

                // Setup unified Touch/Click Event Processing
                const handleAction = (e) => {
                    if (e.cancelable) e.preventDefault();
                    audio.init();
                    this.onInputTrigger();
                };

                window.addEventListener('touchstart', handleAction, { passive: false });
                window.addEventListener('mousedown', (e) => {
                    // Ignore if target is interactive HTML elements button
                    if (e.target.closest('.interactive')) return;
                    handleAction(e);
                });

                this.restartBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.startGame();
                });
                this.restartBtn.addEventListener('touchstart', (e) => {
                    e.stopPropagation();
                    this.startGame();
                });

                this.muteBtn.addEventListener('click', (e) => this.toggleMute(e));
                this.muteBtn.addEventListener('touchstart', (e) => this.toggleMute(e));
            }

            toggleMute(e) {
                e.stopPropagation();
                audio.muted = !audio.muted;
                this.muteBtn.innerText = audio.muted ? '🔇' : '🔊';
            }

            resizeCanvas() {
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                
                // Letterboxing & Responsive Math Configuration
                const windowRatio = windowWidth / windowHeight;
                const targetRatio = this.baseWidth / this.baseHeight;
                
                if (windowRatio > targetRatio) {
                    this.canvas.style.height = windowHeight + 'px';
                    this.canvas.style.width = (windowHeight * targetRatio) + 'px';
                } else {
                    this.canvas.style.width = windowWidth + 'px';
                    this.canvas.style.height = (windowWidth / targetRatio) + 'px';
                }

                // Handle retina display pixel density sharpness
                const dpr = window.devicePixelRatio || 1;
                this.canvas.width = this.baseWidth * dpr;
                this.canvas.height = this.baseHeight * dpr;
                this.ctx.scale(dpr, dpr);
            }

            onInputTrigger() {
                if (this.state === 'MENU') {
                    this.startGame();
                } else if (this.state === 'PLAYING') {
                    audio.playTap();
                    this.player.jumpAndTurn();
                }
            }

            startGame() {
                this.score = 0;
                this.lives = 3;
                this.currentSpeed = CONFIG.baseSpeed;
                this.currentSpawnInterval = CONFIG.spawnInterval;
                this.items = [];
                this.particles = [];
                this.floatingTexts = [];
                this.player.reset();
                
                this.scoreDisplay.innerText = this.score;
                this.updateLivesUI();
                
                this.mainMenu.classList.add('hidden');
                this.gameOverScreen.classList.add('hidden');
                this.newHighBanner.classList.add('hidden');
                this.hud.classList.add('visible');
                
                this.state = 'PLAYING';
            }

            triggerGameOver() {
                this.state = 'GAMEOVER';
                audio.playExplode();
                
                let isNewHigh = false;
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('at_high_score', this.highScore);
                    isNewHigh = true;
                    this.newHighBanner.classList.remove('hidden');
                }

                this.finalScoreTxt.innerText = this.score;
                this.gameoverHighScore.innerText = `Best: ${this.highScore}`;
                this.menuHighScore.innerText = `High Score: ${this.highScore}`;
                
                this.hud.classList.remove('visible');
                this.gameOverScreen.classList.remove('hidden');
            }

            updateLivesUI() {
                this.livesDisplay.innerText = '❤️'.repeat(Math.max(0, this.lives));
            }

            triggerScreenShake(intensity, duration) {
                this.shakeIntensity = intensity;
                this.shakeTime = duration;
            }

            // --- Main Loops Architecture ---
            loop(timestamp) {
                if (!this.lastTime) this.lastTime = timestamp;
                let dt = (timestamp - this.lastTime) / 1000;
                if (dt > 0.1) dt = 0.1; // Cap dt during lag spikes
                this.lastTime = timestamp;

                this.update(dt);
                this.render();

                window.requestAnimationFrame((t) => this.loop(t));
            }

            update(dt) {
                // Update Screen Shake timers
                if (this.shakeTime > 0) {
                    this.shakeTime -= dt;
                }

                if (this.state !== 'PLAYING') return;

                this.player.update(dt);

                // Spawn Controller Logic
                this.spawnTimer += dt * 1000;
                if (this.spawnTimer >= this.currentSpawnInterval) {
                    this.items.push(new Item(this.baseWidth, this.currentSpeed));
                    this.spawnTimer = 0;
                }

                // Update Items
                for (let i = this.items.length - 1; i >= 0; i--) {
                    let item = this.items[i];
                    item.update(dt);

                    // Core Collision AABB Check with Player Paddle/Character
                    if (item.y + item.height >= this.player.y &&
                        item.y <= this.player.y + this.player.height &&
                        item.x + item.width >= this.player.x &&
                        item.x <= this.player.x + this.player.width) {
                        
                        this.handleCatch(item);
                        this.items.splice(i, 1);
                        continue;
                    }

                    // Floor Ground Loss conditions boundary check
                    if (item.y > this.baseHeight - 80) {
                        if (item.type === 'good' || item.type === 'rare') {
                            this.lives--;
                            this.updateLivesUI();
                            this.triggerScreenShake(8, 0.2);
                            audio.playExplode();
                            
                            if (this.lives <= 0) {
                                this.triggerGameOver();
                            }
                        }
                        this.items.splice(i, 1);
                    }
                }

                // Process FX Mechanics
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    this.particles[i].update(dt);
                    if (this.particles[i].alpha <= 0) this.particles.splice(i, 1);
                }
                for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
                    this.floatingTexts[i].update(dt);
                    if (this.floatingTexts[i].alpha <= 0) this.floatingTexts.splice(i, 1);
                }
            }

            handleCatch(item) {
                if (item.type === 'good') {
                    this.score += 1;
                    audio.playCollect(false);
                    this.createExplosion(item.x + item.width/2, item.y + item.height/2, CONFIG.colors.yellow, 8);
                    this.floatingTexts.push(new FloatingText(item.x + item.width/2, item.y, '+1', CONFIG.colors.white));
                } else if (item.type === 'rare') {
                    this.score += 10;
                    audio.playCollect(true);
                    this.createExplosion(item.x + item.width/2, item.y + item.height/2, CONFIG.colors.cyan, 16);
                    this.floatingTexts.push(new FloatingText(item.x + item.width/2, item.y, '+10 ✨', CONFIG.colors.yellow));
                } else if (item.type === 'bad') {
                    // Caught a hazardous sun element
                    this.lives--;
                    this.updateLivesUI();
                    this.triggerScreenShake(12, 0.3);
                    audio.playExplode();
                    this.createExplosion(item.x + item.width/2, item.y + item.height/2, '#ff3333', 15);
                    this.floatingTexts.push(new FloatingText(item.x + item.width/2, item.y, '💥 OUCH!', '#ff3333'));
                    
                    if (this.lives <= 0) {
                        this.triggerGameOver();
                    }
                }

                this.scoreDisplay.innerText = this.score;

                // Scale Difficulty Progression Dynamic Speeds
                if (item.type !== 'bad') {
                    this.currentSpeed = Math.min(CONFIG.maxSpeed, this.currentSpeed + CONFIG.speedStep);
                    this.currentSpawnInterval = Math.max(CONFIG.minSpawnInterval, CONFIG.spawnInterval - (this.score * 5));
                }
            }

            createExplosion(x, y, color, count) {
                for (let i = 0; i < count; i++) {
                    this.particles.push(new Particle(x, y, color));
                }
            }

            render() {
                this.ctx.save();
                
                // Screen Shake application matrix offset transformation
                if (this.shakeTime > 0) {
                    let dx = (Math.random() - 0.5) * this.shakeIntensity;
                    let dy = (Math.random() - 0.5) * this.shakeIntensity;
                    this.ctx.translate(dx, dy);
                }

                // Clean Screen Surface
                this.ctx.clearRect(0, 0, this.baseWidth, this.baseHeight);

                // Draw Ground Layer Floor
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                this.ctx.fillRect(0, this.baseHeight - 85, this.baseWidth, 5);

                // Render Main Objects
                this.player.render(this.ctx);
                
                this.items.forEach(item => item.render(this.ctx));
                this.particles.forEach(p => p.render(this.ctx));
                this.floatingTexts.forEach(ft => ft.render(this.ctx));

                this.ctx.restore();
            }
        }

        // --- Init Startup Activation ---
        window.onload = () => {
            new Game();
        };
    </script>
</body>
</html>
