<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SUPERS - Hardcore 4-Arah</title>
    <style>
        /* Comic Pop Art Theming and Layout */
        :root {
            --bg-color: #f0e6d2;
            --primary-color: #e63946;
            --secondary-color: #1d3557;
            --accent-color: #ffb703;
            --success-color: #2a9d8f;
            --bomb-color: #f77f00;
            --wall-color: #d4a373;
            --dark-color: #000000;
            --font-stack: 'Impact', 'Arial Black', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--dark-color);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            font-family: var(--font-stack);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background-color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* Responsive HTML UI Overlays */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
            z-index: 2;
        }

        .interactive {
            pointer-events: auto;
        }

        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .hud-panel {
            background: #fff;
            border: 4px solid var(--dark-color);
            padding: 8px 16px;
            font-size: 20px;
            color: var(--dark-color);
            box-shadow: 4px 4px 0px var(--dark-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            transform: rotate(-1deg);
        }

        #mute-btn {
            background: var(--accent-color);
            border: 4px solid var(--dark-color);
            width: 45px;
            height: 45px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--dark-color);
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotate(3deg);
        }

        /* Mobile Mobile Pad Overlay Zones */
        #touch-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            grid-template-rows: 1fr 1.2fr 1fr;
            grid-template-columns: 1fr 1.2fr 1fr;
            z-index: 3;
            pointer-events: auto;
        }

        .ctrl-zone { background: rgba(0,0,0,0.0); }
        #z-up { grid-area: up; }
        #z-down { grid-area: down; }
        #z-left { grid-area: left; }
        #z-right { grid-area: right; }

        /* Math Quiz Pop-up */
        #math-overlay {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -20%) rotate(-1deg);
            background: #fff;
            border: 6px solid var(--dark-color);
            box-shadow: 10px 10px 0px var(--dark-color);
            padding: 25px;
            width: 85%;
            max-width: 360px;
            text-align: center;
            z-index: 6;
            box-sizing: border-box;
        }

        #math-alert-title {
            color: var(--primary-color);
            font-size: 28px;
            margin: 0 0 5px 0;
            -webkit-text-stroke: 1px var(--dark-color);
        }

        #math-question {
            font-size: 36px;
            color: var(--secondary-color);
            margin: 0 0 20px 0;
        }

        .math-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .math-btn {
            background: var(--accent-color);
            border: 3px solid var(--dark-color);
            padding: 12px;
            font-family: var(--font-stack);
            font-size: 24px;
            cursor: pointer;
            box-shadow: 3px 3px 0px var(--dark-color);
        }

        .math-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--dark-color);
        }

        /* Screen States Overlay */
        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(29, 53, 87, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }

        .comic-box {
            background: #fff;
            border: 6px solid var(--dark-color);
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 12px 12px 0px var(--dark-color);
            transform: rotate(-2deg);
        }

        .comic-title {
            font-size: 56px;
            color: var(--primary-color);
            margin: 0 0 10px 0;
            text-shadow: 3px 3px 0px var(--dark-color);
            -webkit-text-stroke: 2px var(--dark-color);
        }

        .comic-subtitle {
            font-size: 14px;
            color: var(--secondary-color);
            margin-bottom: 25px;
            font-family: Arial, sans-serif;
            font-weight: bold;
        }

        .score-info {
            font-size: 24px;
            margin: 15px 0;
            color: var(--dark-color);
            border-bottom: 2px dashed var(--dark-color);
            padding-bottom: 10px;
        }

        .comic-btn {
            background: var(--primary-color);
            color: #fff;
            border: 4px solid var(--dark-color);
            padding: 15px 30px;
            font-size: 26px;
            font-family: var(--font-stack);
            cursor: pointer;
            box-shadow: 6px 6px 0px var(--dark-color);
            width: 100%;
            box-sizing: border-box;
        }
        
        .comic-btn:active { transform: translate(4px, 4px); box-shadow: 2px 2px 0px var(--dark-color); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- Sentuhan 4 Arah D-PAD (Lutsinar) -->
        <div id="touch-controls" class="hidden">
            <div id="z-up" class="ctrl-zone"></div>
            <div id="z-left" class="ctrl-zone"></div>
            <div id="z-right" class="ctrl-zone"></div>
            <div id="z-down" class="ctrl-zone"></div>
        </div>

        <div id="math-overlay" class="interactive hidden">
            <h3 id="math-alert-title">💥 VENOM! 💥</h3>
            <p style="margin: 0 0 10px 0; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold;">Jawab cepat untuk selamat!</p>
            <h2 id="math-question">5 + 3 = ?</h2>
            <div class="math-options">
                <button class="math-btn" onclick="checkAnswer(0)">0</button>
                <button class="math-btn" onclick="checkAnswer(1)">0</button>
                <button class="math-btn" onclick="checkAnswer(2)">0</button>
                <button class="math-btn" onclick="checkAnswer(3)">0</button>
            </div>
        </div>

        <div class="ui-layer">
            <div id="hud">
                <div id="hud-score" class="hud-panel">SKOR: 0</div>
                <div id="hud-hp" class="hud-panel" style="background-color: #e63946; color: white;">HP: 3</div>
                <button id="mute-btn" class="interactive">🔊</button>
            </div>
        </div>

        <div id="start-screen" class="screen-overlay interactive">
            <div class="comic-box">
                <h1 class="comic-title">SUPERS</h1>
                <p class="comic-subtitle">KAWALAN 4-ARAH: Sentuh Skrin / Guna WASD.<br><br>🚨 <b>AWAS:</b> Elak Bom Labu (Oren) & Dinding Pasir (Coklat)! Terlanggar = Terus Hilang Nyawa (Tiada Kuiz!).</p>
                <div class="score-info" id="start-high-score">REKOD TERTINGGI: 0</div>
                <button class="comic-btn" id="start-btn">MULA BERMAIN</button>
            </div>
        </div>

        <div id="game-over-screen" class="screen-overlay interactive hidden">
            <div class="comic-box" style="transform: rotate(1deg); border-color: var(--primary-color);">
                <h1 class="comic-title" style="color: var(--dark-color);">TAMAT</h1>
                <div class="score-info">
                    <p id="final-score">SKOR: 0</p>
                    <p id="best-score" style="font-size: 18px; color: #555;">TERBAIK: 0</p>
                </div>
                <button class="comic-btn" id="restart-btn" style="background: var(--accent-color); color: var(--dark-color);">MAIN SEMULA</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION (DILAUKAN / FAST-PACED)
        // ==========================================
        const CONFIG = {
            player: { speed: 600, maxHp: 3, radius: 22, trailInterval: 0.03 }, // Lebih pantas dan tangkas
            spawn: {
                baseEnemyRate: 0.7,   // Muncul lebih kerap
                webRate: 2.0,         
                bombRate: 2.5,        // Bom labu baru
                wallRate: 4.5,        // Dinding pasir baru
                bossScoreInterval: 350 
            },
            enemy: { speedMin: 220, speedMax: 400, radius: 20 }, // Jatuh menderu
            boss: { radius: 42, speed: 180 },
            bomb: { speed: 280, radius: 18 },
            wall: { speed: 160, width: 220, height: 35 },
            canvasWidth: 450,       
            canvasHeight: 800       
        };

        class AudioController {
            constructor() { this.ctx = null; this.isMuted = false; }
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            }
            playMove() {
                if (this.isMuted || !this.ctx) return;
                let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(250, this.ctx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.05);
            }
            playCollect() {
                if (this.isMuted || !this.ctx) return;
                let now = this.ctx.currentTime;
                let osc1 = this.ctx.createOscillator(); let gain1 = this.ctx.createGain();
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(523.25, now);
                gain1.gain.setValueAtTime(0.2, now); gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc1.connect(gain1); gain1.connect(this.ctx.destination);
                osc1.start(now); osc1.stop(now + 0.1);
            }
            playDamage() {
                if (this.isMuted || !this.ctx) return;
                let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.25);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.25);
            }
        }
        const audio = new AudioController();

        // ==========================================
        // VARIABLES
        // ==========================================
        let canvas = document.getElementById('gameCanvas');
        let ctx = canvas.getContext('2d');
        let gameState = 'START'; 
        let score = 0;
        let highScore = parseInt(localStorage.getItem('supers_hardcore_high')) || 0;
        let hp = CONFIG.player.maxHp;
        let lastTime = 0;
        let screenShakeTime = 0;

        let playerX = CONFIG.canvasWidth / 2;
        let playerY = CONFIG.canvasHeight - 150; 
        let playerTrail = []; let trailTimer = 0; let shieldTimer = 0; 

        // Entiti
        let enemies = []; let webs = []; let bombs = []; let walls = [];
        let particles = []; let floaters = [];

        // Pemasa
        let enemySpawnTimer = 0; let webSpawnTimer = 0; let bombSpawnTimer = 0; let wallSpawnTimer = 0;
        let nextBossScoreThreshold = CONFIG.spawn.bossScoreInterval;

        let keyboardKeys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let mobileDirection = { up: false, down: false, left: false, right: false };

        let isQuizActive = false;
        let currentCorrectAnswer = 0;
        let activeCollisionTarget = null; 

        document.getElementById('start-high-score').innerText = `REKOD TERTINGGI: ${highScore}`;
        document.getElementById('mute-btn').addEventListener('click', (e) => {
            e.stopPropagation(); audio.isMuted = !audio.isMuted; e.target.innerText = audio.isMuted ? '🔇' : '🔊';
        });

        // ==========================================
        // INPUT CONTROLS
        // ==========================================
        function hookMobileZone(id, dirName) {
            const zone = document.getElementById(id);
            zone.addEventListener('touchstart', (e) => {
                e.preventDefault(); audio.init();
                if (isQuizActive || gameState !== 'PLAYING') return;
                mobileDirection[dirName] = true; audio.playMove();
            }, { passive: false });
            zone.addEventListener('touchend', (e) => { e.preventDefault(); mobileDirection[dirName] = false; }, { passive: false });
        }
        hookMobileZone('z-up', 'up'); hookMobileZone('z-down', 'down'); hookMobileZone('z-left', 'left'); hookMobileZone('z-right', 'right');

        window.addEventListener('keydown', (e) => {
            audio.init();
            if (isQuizActive || gameState !== 'PLAYING') return;
            if (e.key in keyboardKeys) { keyboardKeys[e.key] = true; audio.playMove(); }
        });
        window.addEventListener('keyup', (e) => { if (e.key in keyboardKeys) keyboardKeys[e.key] = false; });

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        // ==========================================
        // MATH QUIZ (VENOM SAHAJA)
        // ==========================================
        function triggerMathQuiz(targetEntity) {
            if (isQuizActive || shieldTimer > 0) return;
            isQuizActive = true;
            for (let k in keyboardKeys) keyboardKeys[k] = false;
            for (let m in mobileDirection) mobileDirection[m] = false;
            
            activeCollisionTarget = targetEntity; 
            audio.playDamage(); 

            let num1, num2, ans, sign;
            const rand = Math.random();
            if(rand < 0.33){ num1 = Math.floor(Math.random()*20)+5; num2 = Math.floor(Math.random()*15)+5; sign = '+'; ans = num1+num2; }
            else if(rand < 0.66){ num1 = Math.floor(Math.random()*20)+10; num2 = Math.floor(Math.random()*num1); sign = '-'; ans = num1-num2; }
            else { num1 = Math.floor(Math.random()*10)+2; num2 = Math.floor(Math.random()*10)+2; sign = '×'; ans = num1*num2; }

            currentCorrectAnswer = ans;
            let opts = [ans];
            while(opts.length < 4){
                let w = ans + (Math.floor(Math.random()*9)-4);
                if(w !== ans && w >= 0 && !opts.includes(w)) opts.push(w);
            }
            opts.sort(() => Math.random() - 0.5);

            document.getElementById('math-question').innerText = `${num1} ${sign} ${num2} = ?`;
            const btns = document.querySelectorAll('.math-btn');
            btns.forEach((b, i) => { b.innerText = opts[i]; b.setAttribute('data-value', opts[i]); });
            document.getElementById('math-overlay').classList.remove('hidden');
        }

        function checkAnswer(btnIndex) {
            if (!isQuizActive) return;
            const val = parseInt(document.querySelectorAll('.math-btn')[btnIndex].getAttribute('data-value'));
            if (val === currentCorrectAnswer) {
                audio.playCollect(); score += 100; 
                document.getElementById('hud-score').innerText = `SKOR: ${score}`;
                spawnFloatingText(CONFIG.canvasWidth/2, CONFIG.canvasHeight-200, "BIJAK! +100", '#2a9d8f');
                if (activeCollisionTarget) { spawnExplosion(activeCollisionTarget.x, activeCollisionTarget.y, '#2a9d8f', 20); activeCollisionTarget.toRemove = true; }
                shieldTimer = 1.2; 
            } else {
                takeDamage("SALAH JAWAB! HP -1");
                if (activeCollisionTarget) activeCollisionTarget.toRemove = true;
            }
            document.getElementById('math-overlay').classList.add('hidden');
            isQuizActive = false; activeCollisionTarget = null;
        }

        function takeDamage(msg) {
            if (shieldTimer > 0) return; // Diselamatkan oleh perisai
            hp--;
            document.getElementById('hud-hp').innerText = `HP: ${hp}`;
            spawnFloatingText(CONFIG.canvasWidth/2, CONFIG.canvasHeight/2, msg, '#e63946');
            screenShakeTime = 0.4;
            audio.playDamage();
            shieldTimer = 1.0; // Temp kebal dari terkena bertubi-tubi
            if (hp <= 0) triggerGameOver();
        }

        function triggerGameOver() {
            gameState = 'GAMEOVER';
            document.getElementById('math-overlay').classList.add('hidden');
            document.getElementById('touch-controls').classList.add('hidden');
            document.getElementById('final-score').innerText = `SKOR: ${score}`;
            document.getElementById('best-score').innerText = `TERBAIK: ${highScore}`;
            if (score > highScore) {
                highScore = score; localStorage.setItem('supers_hardcore_high', highScore);
            }
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        // ==========================================
        // ENGINE & RESIZE
        // ==========================================
        function resizeCanvas() {
            const ratio = CONFIG.canvasWidth / CONFIG.canvasHeight;
            if (window.innerWidth / window.innerHeight > ratio) {
                canvas.style.height = '100%'; canvas.style.width = (window.innerHeight * ratio) + 'px';
            } else {
                canvas.style.width = '100%'; canvas.style.height = (window.innerWidth / ratio) + 'px';
            }
            const dpr = window.devicePixelRatio || 1;
            canvas.width = CONFIG.canvasWidth * dpr; canvas.height = CONFIG.canvasHeight * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas); window.addEventListener('load', resizeCanvas);

        function drawHalftone() {
            ctx.fillStyle = '#f0e6d2'; ctx.fillRect(0, 0, CONFIG.canvasWidth, CONFIG.canvasHeight);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            for (let x=10; x<CONFIG.canvasWidth; x+=20) for (let y=10; y<CONFIG.canvasHeight; y+=20) {
                ctx.beginPath(); ctx.arc(x,y,2.5,0,Math.PI*2); ctx.fill();
            }
        }
        function drawCircle(x,y,r,c,w=3) {
            ctx.save(); ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=c; ctx.fill();
            ctx.lineWidth=w; ctx.strokeStyle='#000'; ctx.stroke(); ctx.restore();
        }
        function spawnExplosion(x,y,c,cnt=12) {
            for(let i=0;i<cnt;i++) {
                let a = Math.random()*Math.PI*2; let s = 100+Math.random()*250;
                particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, radius: 4+Math.random()*6, color: c, alpha: 1, life: 0.3+Math.random()*0.3 });
            }
        }
        function spawnFloatingText(x,y,txt,col) { floaters.push({ x, y, text: txt, color: col, alpha: 1, vy: -70, life: 0.9 }); }

        // ==========================================
        // MAIN LOOP
        // ==========================================
        function startGame() {
            audio.init(); score = 0; hp = CONFIG.player.maxHp; 
            playerX = CONFIG.canvasWidth / 2; playerY = CONFIG.canvasHeight - 150;
            enemies = []; webs = []; bombs = []; walls = []; particles = []; floaters = []; playerTrail = [];
            enemySpawnTimer = 0; webSpawnTimer = 0; bombSpawnTimer = 0; wallSpawnTimer = 0; shieldTimer = 0;
            nextBossScoreThreshold = CONFIG.spawn.bossScoreInterval;
            isQuizActive = false;

            for(let k in keyboardKeys) keyboardKeys[k] = false;
            for(let m in mobileDirection) mobileDirection[m] = false;

            document.getElementById('hud-score').innerText = `SKOR: 0`; document.getElementById('hud-hp').innerText = `HP: 3`;
            document.getElementById('start-screen').classList.add('hidden'); document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('math-overlay').classList.add('hidden'); document.getElementById('touch-controls').classList.remove('hidden');
            
            gameState = 'PLAYING'; lastTime = performance.now(); resizeCanvas(); requestAnimationFrame(gameLoop);
        }

        function updateGame(dt) {
            if (screenShakeTime > 0) screenShakeTime -= dt;
            if (shieldTimer > 0) shieldTimer -= dt;

            const speedModifier = isQuizActive ? 0.01 : 1.0; // Pegun apabila soalan ditanya

            // 1. Move Player
            if (!isQuizActive) {
                if (keyboardKeys.w || keyboardKeys.ArrowUp || mobileDirection.up) playerY -= CONFIG.player.speed * dt;
                if (keyboardKeys.s || keyboardKeys.ArrowDown || mobileDirection.down) playerY += CONFIG.player.speed * dt;
                if (keyboardKeys.a || keyboardKeys.ArrowLeft || mobileDirection.left) playerX -= CONFIG.player.speed * dt;
                if (keyboardKeys.d || keyboardKeys.ArrowRight || mobileDirection.right) playerX += CONFIG.player.speed * dt;
            }
            if (playerX < CONFIG.player.radius+5) playerX = CONFIG.player.radius+5;
            if (playerX > CONFIG.canvasWidth-CONFIG.player.radius-5) playerX = CONFIG.canvasWidth-CONFIG.player.radius-5;
            if (playerY < CONFIG.player.radius+70) playerY = CONFIG.player.radius+70;
            if (playerY > CONFIG.canvasHeight-CONFIG.player.radius-15) playerY = CONFIG.canvasHeight-CONFIG.player.radius-15;

            if ((keyboardKeys.w || keyboardKeys.s || keyboardKeys.a || keyboardKeys.d || keyboardKeys.ArrowUp || keyboardKeys.ArrowDown || keyboardKeys.ArrowLeft || keyboardKeys.ArrowRight || mobileDirection.up || mobileDirection.down || mobileDirection.left || mobileDirection.right) && !isQuizActive) {
                trailTimer += dt;
                if (trailTimer >= CONFIG.player.trailInterval) {
                    playerTrail.push({ x: playerX, y: playerY, alpha: 0.5 }); trailTimer = 0;
                }
            }
            playerTrail.forEach(t => t.alpha -= dt*2.5); playerTrail = playerTrail.filter(t => t.alpha > 0);

            // 2. Spawning (Fast Scaling based on Score)
            let diffMult = 1.0 + (score/800);
            
            enemySpawnTimer += dt * speedModifier;
            if (enemySpawnTimer >= (CONFIG.spawn.baseEnemyRate / diffMult)) {
                enemySpawnTimer = 0;
                if (score >= nextBossScoreThreshold) {
                    nextBossScoreThreshold += CONFIG.spawn.bossScoreInterval;
                    enemies.push({ x: 60+Math.random()*(CONFIG.canvasWidth-120), y: -CONFIG.boss.radius, radius: CONFIG.boss.radius, speed: CONFIG.boss.speed, isBoss: true, toRemove: false });
                } else {
                    enemies.push({ x: 30+Math.random()*(CONFIG.canvasWidth-60), y: -CONFIG.enemy.radius, radius: CONFIG.enemy.radius, speed: CONFIG.enemy.speedMin+Math.random()*(CONFIG.enemy.speedMax-CONFIG.enemy.speedMin), isBoss: false, toRemove: false });
                }
            }

            webSpawnTimer += dt * speedModifier;
            if (webSpawnTimer >= (CONFIG.spawn.webRate / diffMult)) {
                webSpawnTimer = 0; webs.push({ x: 30+Math.random()*(CONFIG.canvasWidth-60), y: -15, radius: 16, speed: 200 });
            }

            bombSpawnTimer += dt * speedModifier;
            if (bombSpawnTimer >= (CONFIG.spawn.bombRate / (diffMult*0.8)) && score > 150) { // Mula keluar lepas skor 150
                bombSpawnTimer = 0; 
                bombs.push({ x: 30+Math.random()*(CONFIG.canvasWidth-60), y: -20, radius: CONFIG.bomb.radius, speed: CONFIG.bomb.speed, time: Math.random()*100, toRemove: false });
            }

            wallSpawnTimer += dt * speedModifier;
            if (wallSpawnTimer >= (CONFIG.spawn.wallRate / diffMult) && score > 300) { // Mula keluar lepas skor 300
                wallSpawnTimer = 0;
                let isLeft = Math.random() > 0.5;
                walls.push({ x: isLeft ? 0 : CONFIG.canvasWidth - CONFIG.wall.width, y: -50, w: CONFIG.wall.width, h: CONFIG.wall.height, speed: CONFIG.wall.speed, toRemove: false });
            }

            // 3. Movement Updates
            enemies.forEach(e => e.y += e.speed * dt * speedModifier);
            webs.forEach(w => w.y += w.speed * dt * speedModifier);
            bombs.forEach(b => {
                b.time += dt * 6 * speedModifier;
                b.x += Math.cos(b.time) * 120 * dt * speedModifier; // Bergerak zig-zag
                b.y += b.speed * dt * speedModifier;
            });
            walls.forEach(wa => wa.y += wa.speed * dt * speedModifier);

            // 4. Hit Collisions
            // Kutip Sarang
            webs.forEach((w, index) => {
                if (Math.hypot(w.x - playerX, w.y - playerY) < CONFIG.player.radius + w.radius) {
                    audio.playCollect(); score += 50; document.getElementById('hud-score').innerText = `SKOR: ${score}`;
                    spawnFloatingText(w.x, w.y, "+50", '#2a9d8f'); webs.splice(index, 1);
                }
            });

            if (!isQuizActive) {
                // Venom -> KUIZ MATEMATIK
                if (shieldTimer <= 0) {
                    enemies.forEach(e => {
                        if (Math.hypot(e.x - playerX, e.y - playerY) < CONFIG.player.radius + e.radius) triggerMathQuiz(e);
                    });
                }
                
                // Bom Labu -> MATI TERUS (Instant Damage)
                bombs.forEach(b => {
                    if (Math.hypot(b.x - playerX, b.y - playerY) < CONFIG.player.radius + b.radius) {
                        spawnExplosion(b.x, b.y, '#f77f00', 15); b.toRemove = true;
                        takeDamage("TERKENA BOM!");
                    }
                });

                // Dinding Pasir -> MATI TERUS (Circle-Rectangle Collision)
                walls.forEach(wa => {
                    let testX = playerX; let testY = playerY;
                    if (playerX < wa.x) testX = wa.x; else if (playerX > wa.x + wa.w) testX = wa.x + wa.w;
                    if (playerY < wa.y) testY = wa.y; else if (playerY > wa.y + wa.h) testY = wa.y + wa.h;
                    
                    let distX = playerX - testX; let distY = playerY - testY;
                    let distance = Math.sqrt((distX*distX) + (distY*distY));
                    
                    if (distance <= CONFIG.player.radius) {
                        spawnExplosion(playerX, playerY, '#d4a373', 15); wa.toRemove = true;
                        takeDamage("TERHEMPAP DINDING!");
                    }
                });
            }

            // Pembersihan Memori
            enemies = enemies.filter(e => e.y < CONFIG.canvasHeight + 60 && !e.toRemove);
            webs = webs.filter(w => w.y < CONFIG.canvasHeight + 50);
            bombs = bombs.filter(b => b.y < CONFIG.canvasHeight + 50 && !b.toRemove);
            walls = walls.filter(w => w.y < CONFIG.canvasHeight + 100 && !w.toRemove);

            particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.alpha -= dt / p.life; });
            particles = particles.filter(p => p.alpha > 0);
            floaters.forEach(f => { f.y += f.vy * dt; f.alpha -= dt / f.life; });
            floaters = floaters.filter(f => f.alpha > 0);
        }

        function drawGame() {
            ctx.save();
            if (screenShakeTime > 0) ctx.translate((Math.random()-0.5)*12, (Math.random()-0.5)*12);
            drawHalftone();

            // Dinding Pasir (Barikade)
            walls.forEach(wa => {
                ctx.fillStyle = '#d4a373';
                ctx.fillRect(wa.x, wa.y, wa.w, wa.h);
                ctx.lineWidth = 4; ctx.strokeStyle = '#000';
                ctx.strokeRect(wa.x, wa.y, wa.w, wa.h);
                // Corak batu bata/pasir
                ctx.beginPath(); ctx.moveTo(wa.x+20, wa.y); ctx.lineTo(wa.x+20, wa.y+wa.h); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(wa.x+100, wa.y); ctx.lineTo(wa.x+100, wa.y+wa.h); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(wa.x+180, wa.y); ctx.lineTo(wa.x+180, wa.y+wa.h); ctx.stroke();
            });

            // Bom Labu
            bombs.forEach(b => {
                drawCircle(b.x, b.y, b.radius, '#f77f00', 3);
                // Tangkai hijau
                ctx.fillStyle = '#2a9d8f';
                ctx.fillRect(b.x-4, b.y-b.radius-6, 8, 8);
                ctx.strokeRect(b.x-4, b.y-b.radius-6, 8, 8);
                // Muka jahat
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.moveTo(b.x-8, b.y-4); ctx.lineTo(b.x-2, b.y-2); ctx.lineTo(b.x-6, b.y+2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(b.x+8, b.y-4); ctx.lineTo(b.x+2, b.y-2); ctx.lineTo(b.x+6, b.y+2); ctx.fill();
            });

            webs.forEach(w => {
                drawCircle(w.x, w.y, w.radius, 'rgba(255,255,255,0.9)', 3);
                ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.beginPath();
                for(let i=0; i<4; i++) {
                    let a = (i*Math.PI)/4;
                    ctx.moveTo(w.x - Math.cos(a)*w.radius, w.y - Math.sin(a)*w.radius);
                    ctx.lineTo(w.x + Math.cos(a)*w.radius, w.y + Math.sin(a)*w.radius);
                } ctx.stroke();
            });

            playerTrail.forEach(t => { ctx.save(); ctx.globalAlpha = t.alpha; drawCircle(t.x, t.y, CONFIG.player.radius, 'rgba(230,57,70,0.4)', 1); ctx.restore(); });

            if (shieldTimer > 0 && Math.floor(Date.now() / 50) % 2 === 0) {
                ctx.strokeStyle = '#2a9d8f'; ctx.lineWidth = 6;
                ctx.beginPath(); ctx.arc(playerX, playerY, CONFIG.player.radius+6, 0, Math.PI*2); ctx.stroke();
            }

            // Spidey
            drawCircle(playerX, playerY, CONFIG.player.radius, '#e63946', 4);
            ctx.fillStyle = '#fff'; ctx.beginPath();
            ctx.ellipse(playerX-7, playerY-4, 5, 8, Math.PI/6, 0, Math.PI*2);
            ctx.ellipse(playerX+7, playerY-4, 5, 8, -Math.PI/6, 0, Math.PI*2); ctx.fill(); ctx.stroke();

            // Venom
            enemies.forEach(e => {
                if (e.isBoss) {
                    drawCircle(e.x, e.y, e.radius, '#1d3557', 5);
                    ctx.fillStyle = '#fff'; ctx.beginPath();
                    ctx.ellipse(e.x-12, e.y, 7, 14, -Math.PI/4, 0, Math.PI*2);
                    ctx.ellipse(e.x+12, e.y, 7, 14, Math.PI/4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                } else {
                    drawCircle(e.x, e.y, e.radius, '#000', 3);
                    ctx.fillStyle = '#fff'; ctx.beginPath();
                    ctx.ellipse(e.x-5, e.y-2, 3, 6, -Math.PI/4, 0, Math.PI*2);
                    ctx.ellipse(e.x+5, e.y-2, 3, 6, Math.PI/4, 0, Math.PI*2); ctx.fill();
                }
            });

            particles.forEach(p => { ctx.save(); ctx.globalAlpha = p.alpha; drawCircle(p.x, p.y, p.radius, p.color, 1); ctx.restore(); });
            floaters.forEach(f => {
                ctx.save(); ctx.globalAlpha = f.alpha; ctx.fillStyle = f.color;
                ctx.font = "bold 24px 'Impact', sans-serif"; ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
                ctx.fillText(f.text, f.x-30, f.y); ctx.strokeText(f.text, f.x-30, f.y); ctx.restore();
            });

            ctx.restore();
        }

        function gameLoop(timestamp) {
            if (gameState !== 'PLAYING') return;
            let dt = (timestamp - lastTime) / 1000; if (dt > 0.1) dt = 0.1;
            lastTime = timestamp; updateGame(dt); drawGame(); requestAnimationFrame(gameLoop);
        }
    </script>
</body>
